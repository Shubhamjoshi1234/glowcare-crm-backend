services:
  - type: web
    name: glowcare-crm-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm run deploy:crm
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: DATABASE_URL
        value: file:./render.db
      - key: CHANNEL_SERVICE_HOSTPORT
        fromService:
          type: web
          name: glowcare-channel-service
          property: hostport
      - key: CHANNEL_REQUEST_TIMEOUT_MS
        value: 90000
      - key: FRONTEND_URL
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: AI_RECIPIENT_BATCH_SIZE
        value: 10
      - key: AI_RECIPIENT_CONCURRENCY
        value: 2
      - key: LOG_LEVEL
        value: info

  - type: web
    name: glowcare-channel-service
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm run start:channel
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: CRM_SERVICE_HOSTPORT
        fromService:
          type: web
          name: glowcare-crm-api
          property: hostport
      - key: LOG_LEVEL
        value: info
